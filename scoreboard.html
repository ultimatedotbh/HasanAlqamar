<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>لوحة الترتيب</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="scoreboardPage">

<div class="scoreboardWrapper">

<h2 class="scoreTitle">لوحة الترتيب</h2>

<table id="table">

<thead>

<tr>
<th>#</th>
<th>الاسم</th>
<th>الدرجة</th>
<th>الوقت</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

fetch("https://script.google.com/macros/s/AKfycbwDjm00IRIwJ5y1sE088C3okjGAmBsr4VnA2t9rQt6V2norY5n5pueF2w2nMFuIfUFg/exec")

.then(res=>res.json())

.then(data=>{

let tbody=document.querySelector("#table tbody")

// ترتيب حسب الدرجة ثم الوقت
data.sort((a,b)=>{

if(b.score!=a.score){
return b.score-a.score
}

return a.time-b.time

})

data.forEach((d,i)=>{

tbody.innerHTML+=`

<tr>

<td class="rank">${i+1}</td>

<td>${d.name}</td>

<td class="score">${d.score}</td>

<td>${d.time}s</td>

</tr>

`

})

})

</script>
</div>

<div class="credits">
By Hasan Alqamar
</div>

</body>
</html>
